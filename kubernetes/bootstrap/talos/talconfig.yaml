# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.7.3
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.30.1

clusterName: &cluster k8s-cluster
endpoint: https://192.168.10.10:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "192.168.10.10"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans
cniConfig:
  name: none

nodes:
  - hostname: "k8ssrv-1"
    ipAddress: "192.168.10.101"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/4c4acaf75b4a51d6ec95b38dc8b49fb0af5f699e7fbd12fbf246821c649b5312
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "9a:cc:04:0b:f1:f6"
        dhcp: false
        addresses:
          - "192.168.10.101/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.10.1"
        mtu: 1500
        vip:
          ip: "192.168.10.10"
  - hostname: "k8ssrv-2"
    ipAddress: "192.168.10.102"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/4c4acaf75b4a51d6ec95b38dc8b49fb0af5f699e7fbd12fbf246821c649b5312
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b6:f1:e7:84:7c:75"
        dhcp: false
        addresses:
          - "192.168.10.102/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.10.1"
        mtu: 1500
        vip:
          ip: "192.168.10.10"
  - hostname: "k8ssrv-3"
    ipAddress: "192.168.10.103"
    installDisk: "/dev/sda"
    talosImageURL: factory.talos.dev/installer/4c4acaf75b4a51d6ec95b38dc8b49fb0af5f699e7fbd12fbf246821c649b5312
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "c6:68:53:43:95:4b"
        dhcp: false
        addresses:
          - "192.168.10.103/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.10.1"
        mtu: 1500
        vip:
          ip: "192.168.10.10"

patches:
  # Configure containerd
  - |-
    machine:
      files:
        - op: create
          path: /etc/cri/conf.d/20-customization.part
          content: |-
            [plugins."io.containerd.grpc.v1.cri"]
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
            [plugins."io.containerd.grpc.v1.cri".containerd]
              discard_unpacked_layers = false
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              discard_unpacked_layers = false

  # Disable search domain everywhere
  - |-
    machine:
      network:
        disableSearchDomain: true

  # Enable cluster discovery
  - |-
    cluster:
      discovery:
        registries:
          kubernetes:
            disabled: false
          service:
            disabled: false

  # Configure kubelet
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
        nodeIP:
          validSubnets: ["192.168.10.0/24"]



  # Custom sysctl settings
  - |-
    machine:
      sysctls:
        fs.inotify.max_queued_events: "65536"
        fs.inotify.max_user_watches: "524288"
        fs.inotify.max_user_instances: "8192"
        net.core.rmem_max: "2500000"
        net.core.wmem_max: "2500000"

  # Mount openebs-hostpath and longhorn in kubelet
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/openebs/local
            type: bind
            source: /var/openebs/local
            options: ["bind", "rshared", "rw"]
          - destination: /var/lib/longhorn
            type: bind
            source: /var/lib/longhorn
            options: ["bind", "rshared", "rw"]


controlPlane:
  patches:
    # Cluster configuration
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        coreDNS:
          disabled: true
        proxy:
          disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

    # ETCD configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
          advertisedSubnets:
            - "192.168.10.0/24"

    # Disable default API server admission plugins.
    - |-
      - op: remove
        path: /cluster/apiServer/admissionControl

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles: ["os:admin"]
            allowedKubernetesNamespaces: ["system-upgrade"]
