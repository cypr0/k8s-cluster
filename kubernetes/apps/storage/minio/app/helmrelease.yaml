---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 30m
  chart:
    spec:
      chart: minio
      version: 5.3.0
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    image:
      repository: quay.io/minio/minio
      tag: RELEASE.2024-10-13T13-34-11Z@sha256:9535594ad4122b7a78c6632788a989b96d9199b483d3bd71a5ceae73a922cdfa
    existingSecret: minio-secret
    mode: standalone
    replicas: 3
    resources:
      requests:
        memory: null
    persistence:
      enabled: true
      existingClaim: minio-nfs-pvc
    policies:
    - name: readwrite-k8s-longhorn
      statements:
      - resources:
        - 'arn:aws:s3:::k8s-longhorn'
        - 'arn:aws:s3:::k8s-longhorn/*'
        actions:
        - 's3:PutObject'
        - 's3:GetObject'
        - 's3:ListBucket'
        - 's3:DeleteObject'
    - name: readwrite-k8s-postgres
      statements:
      - resources:
        - 'arn:aws:s3:::k8s-postgres'
        - 'arn:aws:s3:::k8s-postgres/*'
        actions:
        - 's3:PutObject'
        - 's3:GetObject'
        - 's3:ListBucket'
        - 's3:DeleteObject'
    users:
    - accessKey: usrk8slonghorn
      existingSecret: minio-secret
      existingSecretKey: longhorn-user
      policy: readwrite-k8s-longhorn
    - accessKey: usrk8spostgres
      existingSecret: minio-secret
      existingSecretKey: postgres-user
      policy: readwrite-k8s-postgres
    buckets:
    - name: k8s-longhorn
      policy: none
      purge: false
      versioning: false
      objectlocking: false
    - name: k8s-postgres
      policy: none
      purge: false
      versioning: false
      objectlocking: false
    securityContext:
      enabled: true
      runAsUser: 221
      runAsGroup: 220
      fsGroup: 220
      fsGroupChangePolicy: "OnRootMismatch"
    ingress:
      enabled: true
      ingressClassName: external
      annotations:
        external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
      path: /
      hosts:
        - &api s3.${SECRET_DOMAIN}
      tls:
        - hosts:
            - *api
    consoleIngress:
      enabled: true
      ingressClassName: internal
      path: /
      hosts:
        - &host minio.${SECRET_DOMAIN}
      tls:
        - hosts:
            - *host
