apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: elastic-cluster
spec:
  version: 8.14.1
  count: 1
  elasticsearchRef:
    name: elastic-cluster
    namespace: elastic
  podTemplate:
    spec:
      containers:
      - name: kibana
        env:
          - name: NODE_OPTIONS
            value: "--max-old-space-size=2048"
          - name: SERVER_PUBLICBASEURL
            value: "https://kibana.${SECRET_DOMAIN}"
        resources:
          requests:
            memory: 1Gi
            cpu: 0.5
          limits:
            memory: 2.5Gi
            cpu: 2
