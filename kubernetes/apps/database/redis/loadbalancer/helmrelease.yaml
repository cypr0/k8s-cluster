---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-lb
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          haproxy:
            image:
              repository: haproxy
              tag: "3.1.1"
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: 99
            runAsGroup: 99
            fsGroup: 99
            fsGroupChangePolicy: "OnRootMismatch"
    service:
      haproxy:
        controller: main
        type: LoadBalancer
        ipFamilyPolicy: SingleStack
        ports:
          http:
            port: 8080
            targetPort: 8080
          redis-write:
            port: 6379
            targetPort: 6379
          redis-read:
            port: 6380
            targetPort: 6380
          redis-sentinel:
            port: 26379
            targetPort: 26379
    ingress:
      haproxy:
        enabled: true
        className: internal
        hosts:
          - host: &host redis-ui.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: haproxy
                  port: http
        tls:
          - hosts:
              - *host
    configMaps:
      haproxy-config:
        enabled: true
        data:
          haproxy.cfg: |
            global
                daemon
                maxconn 256

            defaults
                mode tcp
                timeout connect 4s
                timeout client 30s
                timeout server 30s
                retry-on all-retryable-errors

            resolvers cluster_ns
                parse-resolv-conf

                hold valid    10s
                hold other    30s
                hold refused  30s
                hold nx       30s
                hold timeout  30s
                hold obsolete 30s

                resolve_retries 3
                timeout retry 1s
                timeout resolve 1s

            frontend http
                bind [::]:8080
                http-request use-service prometheus-exporter if { path /metrics }
                default_backend stats

            backend stats
                mode http
                stats enable
                stats uri /
                stats refresh 5s
                stats show-legends
                stats admin if TRUE

            resolvers k8s
                parse-resolv-conf
                hold other           10s
                hold refused         10s
                hold nx              10s
                hold timeout         10s
                hold valid           10s
                hold obsolete        10s

            frontend redis-read
                bind :6380
                default_backend redis-online

            frontend redis-write
                bind :6379
                default_backend redis-primary

            frontend redis-sentinel-front
                bind :26379
                default_backend redis-sentinel-back

            backend redis-primary
                mode tcp
                balance first
                option tcp-check
                tcp-check connect port 6379
                tcp-check send info\ replication\r\n
                tcp-check expect string role:master
                server redis-0 redis-node-0.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-1 redis-node-1.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-2 redis-node-2.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns

            backend redis-online
                mode tcp
                balance roundrobin
                option tcp-check
                tcp-check connect port 6379
                tcp-check send PING\r\n
                tcp-check expect string +PONG
                server redis-0 redis-node-0.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-1 redis-node-1.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-2 redis-node-2.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns

            backend redis-sentinel-back
                mode tcp
                balance roundrobin
                option tcp-check
                tcp-check connect port 26379
                tcp-check send PING\r\n
                tcp-check expect string +PONG
                server redis-0 redis-node-0.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-1 redis-node-1.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns
                server redis-2 redis-node-2.redis-headless.database.svc.cluster.local check inter 5s resolvers cluster_ns

    persistence:
      haproxy-config:
        enabled: true
        type: configMap
        name: redis-lb-haproxy-config
        globalMounts:
          - path: /usr/local/etc/haproxy/haproxy.cfg
            subPath: haproxy.cfg
            readOnly: true
    serviceMonitor:
      haproxy:
        enabled: true
        serviceName: redis-lb
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
