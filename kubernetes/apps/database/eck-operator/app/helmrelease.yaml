---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eck-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: eck-operator
      version: 2.12.1
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    replicaCount: 1
    image:
      repository: docker.elastic.co/eck/eck-operator
      tag: 2.12.1
      pullPolicy: IfNotPresent
    podMonitor:
      enabled: true
