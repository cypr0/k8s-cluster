---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elastic
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: elastic-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .ELASTIC_USERNAME }}"
        password: "{{ .ELASTIC_PASSWORD }}"
  dataFrom:
    - extract:
        key: elastic
