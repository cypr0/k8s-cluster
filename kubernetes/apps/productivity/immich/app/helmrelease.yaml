---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      annotations:
        reloader.stakater.com/auto: "true"
      securityContext:
        runAsUser: 224
        runAsGroup: 220
        fsGroup: 220
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        containers:
          immich-server:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v1.122.1
            resources:
              requests:
                cpu: 100m
                memory: 250Mi
              limits:
                memory: 1000Mi
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              - name: DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: cnpg-immich-superuser
                    key: username
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: cnpg-immich-superuser
                    key: password
            envFrom:
              - configMapRef:
                  name: immich-immich-config
          immich-machine-learning:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v1.122.1
            resources:
              requests:
                cpu: 15m
                memory: 250Mi
              limits:
                memory: 4000Mi
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              - name: DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: cnpg-immich-superuser
                    key: username
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: cnpg-immich-superuser
                    key: password
            envFrom:
              - configMapRef:
                  name: immich-immich-config
    service:
      immich-server:
        controller: main
        ports:
          http:
            port: 2283
      immich-machine-learning:
        controller: main
        ports:
          http:
            port: 3003
    ingress:
      main:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        hosts:
          - host: &host media.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: immich-server
                  port: http
        tls:
          - hosts:
              - *host
    configMaps:
      immich-config:
        enabled: true
        data:
          TZ: ${TIMEZONE}
          IMMICH_MEDIA_LOCATION: &mediaLocation /usr/src/app/upload
          IMMICH_ENV: production
          REDIS_HOSTNAME: "redis.database.svc.cluster.local"
          REDIS_PORT: "6379"
          REDIS_DBINDEX: "4"
          DB_HOSTNAME: "cnpg-immich-rw.productivity.svc.cluster.local"
          DB_PORT: "5432"
          DB_DATABASE_NAME: "immichdb"
          DB_VECTOR_EXTENSION: "pgvector"
    persistence:
      data:
        enabled: true
        existingClaim: immich-nfs-pvc
        globalMounts:
          - path: *mediaLocation
      cache:
        enabled: true
        type: emptyDir
