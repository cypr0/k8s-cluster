---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-coturn
spec:
  interval: 30m
  chart:
    spec:
      chart: coturn
      version: 1.1.3
      sourceRef:
        kind: HelmRepository
        name: schichtel
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  dependsOn:
    - name: external-secrets
      namespace: security
  values:
    coturn:
      realm: coturn.${SECRET_DOMAIN}
      tls:
        secretName: coturn-tls
      ports:
        relay:
          min: 49152
          max: 65535
      staticSecret:
        secretName: coturn-secret
        secretKey: COTURN_SECRET
      logging:
        verbose: true
        logBinding: true
      mobility: true
    metrics:
      enabled: true
    service:
      type: LoadBalancer
      externalTrafficPolicy: Cluster
      annotations:
        external-dns.alpha.kubernetes.io/hostname: coturn.${SECRET_DOMAIN}
