---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nextcloud-data-nfs
spec:
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  storageClassName: nextcloud-data-nfs
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "${SECRET_NFS_SERVER}"
    path: /mnt/data/nextcloud/
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data-pvc
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: nextcloud-data-nfs
  resources:
    requests:
      storage: 1Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-app-pvc
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: longhorn-backup
  resources:
    requests:
      storage: 25Gi
