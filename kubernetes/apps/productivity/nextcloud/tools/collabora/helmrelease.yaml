---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: collabora
spec:
  interval: 30m
  chart:
    spec:
      chart: collabora-online
      version: 1.1.16
      sourceRef:
        kind: HelmRepository
        name: collabora
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    replicaCount: 1
    ingress:
      enabled: true
      className: "internal"
      annotations:
        nginx.ingress.kubernetes.io/upstream-hash-by: "$arg_WOPISrc"
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      hosts:
        - host: &host "collabora.${SECRET_DOMAIN}"
          paths:
          - path: /
          pathType: ImplementationSpecific
      tls:
        - hosts:
            - *host
    autoscaling:
      enabled: false
    collabora:
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
    prometheus:
      servicemonitor:
        enabled: true
    service:
      type: ClusterIP
      port: 9980
