---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: clamav
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.2.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      clamav:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          clamav:
            env:
              CLAMAV_NO_CLAMD: false
              CLAMAV_NO_FRESHCLAMD: false
              CLAMAV_NO_MILTERD: true
              FRESHCLAM_CHECKS: 4
            image:
              repository: clamav/clamav
              tag: 1.3.1@sha256:5f36baf4248e5fa498b5a575592d9d864f3f7c579f5254105d51ff4b65affed4
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    service:
      clamav:
        controller: clamav
        ports:
          clamd:
            port: 3310
