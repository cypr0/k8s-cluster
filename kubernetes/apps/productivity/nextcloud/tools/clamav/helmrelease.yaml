---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: clamav
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.2.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      clamav:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          clamav:
            env:
              CLAMAV_NO_CLAMD: false
              CLAMAV_NO_FRESHCLAMD: false
              CLAMAV_NO_MILTERD: false
              FRESHCLAM_CHECKS: 4
            image:
              repository: clamav/clamav
              tag: 1.2.3@sha256:f2b699440dc6a2dfa009542f9e0ebb8687656f8b01bbf26b6809e5676d9685d7
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            strategy: RollingUpdate
    service:
      clamav:
        controller: clamav
        ports:
          clamd:
            port: 3310
