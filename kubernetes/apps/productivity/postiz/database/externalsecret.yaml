---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postiz-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postiz-db-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .POSTIZ_DB_USERNAME }}"
        password: "{{ .POSTIZ_DB_PASSWORD }}"
        ACCESS_KEY_ID: "{{ .MINIO_K8SPOSTGRES_KEYID }}"
        SECRET_ACCESS_KEY: "{{ .MINIO_K8SPOSTGRES_SECRET }}"
  dataFrom:
    - extract:
        key: postiz
    - extract:
        key: minio
