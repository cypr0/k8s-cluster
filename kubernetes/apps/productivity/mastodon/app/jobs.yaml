apiVersion: batch/v1
kind: Job
metadata:
  name: mastodon-create-admin-account
spec:
  template:
    spec:
      containers:
      - name: mastodon-create-admin-account
        image: lscr.io/linuxserver/mastodon:4.3.1
        command:
          - sh
          - -c
          - |
            echo "Checking if user ${MASTODON_ADMIN_USER} exists..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
              "https://social.${SECRET_DOMAIN}/api/v1/accounts/lookup?acct=${MASTODON_ADMIN_USER}")
            if [ "$RESPONSE" -eq 200 ]; then
              echo "User ${MASTODON_ADMIN_USER} already exists."
            else
              echo "User does not exist. Creating user..."
              tootctl accounts create $MASTODON_ADMIN_USER --email=admin@${SECRET_DOMAIN} --confirmed --approve --role Owner
            fi
        env:
        - name: DB_HOST
          value: cnpg-mastodon-rw.productivity.svc.cluster.local
        - name: DB_NAME
          value: mastodondb
        - name: DB_PORT
          value: "5432"
        - name: PGID
          value: "1000"
        - name: PUID
          value: "1000"
        - name: RAILS_ENV
          value: production
        - name: REDIS_HOST
          value: dragonfly.database.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        - name: MASTODON_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: app_token
        - name: MASTODON_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: MASTODON_ADMIN_USER
        - name: MASTODON_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: MASTODON_ADMIN_PASSWORD
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: MASTODON_DB_PASSWORD
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: SECRET_KEY_BASE
        - name: OTP_SECRET
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: OTP_SECRET
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: VAPID_PRIVATE_KEY
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: VAPID_PUBLIC_KEY
        - name: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
        - name: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
        - name: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: MASTODON_S3_ACCESS_KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mastodon-secret
              key: MASTODON_S3_SECRET_KEY
        volumeMounts:
        - name: config
          mountPath: /config
      restartPolicy: OnFailure
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: mastodon-config-pvc
