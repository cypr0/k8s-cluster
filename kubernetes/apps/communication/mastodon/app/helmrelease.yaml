---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mastodon
spec:
  interval: 30m
  chart:
    spec:
      chart: *app
      version: 6.1.1
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    global:
      storageClass: "longhorn-backup"
    image:
      registry: docker.io
      repository: bitnami/mastodon
      tag: 4.2.8
    environment: production
    adminUser: ${MASTODON_ADMIN_USER}
    adminEmail: "admin@${SECRET_DOMAIN}"
    existingSecret: "mastodon-secret"
    enableSearches: true
    enableS3: false
    useSecureWebSocket: true
    local_https: true
    localDomain: "social.${SECRET_DOMAIN}"
    webDomain: "social.${SECRET_DOMAIN}"
    defaultLocale: de
    smtp:
      port: 25
      from_address: "admin@${SECRET_DOMAIN}"
      domain: "${SECRET_DOMAIN}"
      delivery_method: smtp
      openssl_verify_mode: none
      enable_starttls_auto: true
      tls: false
      auth_method: plain
      existingSecret: "mastodon-secret"
      existingSecretLoginKey: "MASTODON_SMTP_LOGIN"
      existingSecretPasswordKey: "MASTODON_SMTP_PASSWORD"
      existingSecretServerKey: "MASTODON_SMTP_SERVER"
    web:
      replicaCount: 1
      containerPorts:
        http: 3000
      podAnnotations:
        reloader.stakater.com/auto: "true"
      service:
        type: ClusterIP
        ports:
          http: 80
        externalTrafficPolicy: Cluster
    sidekiq:
      replicaCount: 1
      podAnnotations:
        reloader.stakater.com/auto: "true"
    streaming:
      replicaCount: 1
      containerPorts:
        http: 8080
      podAnnotations:
        reloader.stakater.com/auto: "true"
      service:
        type: ClusterIP
        ports:
          http: 80
    tootctlMediaManagement:
      enabled: true
      removeAttachments: true
      removeAttachmentsDays: 7
      removeCustomEmoji: false
      removePreviewCards: true
      removePreviewCardsDays: 30
      removeAvatars: true
      removeAvatarsDays: 30
      removeHeaders: true
      removeHeadersDays: 30
      removeOrphans: true
      includeFollows: false
      cronSchedule: "14 3 * * *"
      failedJobsHistoryLimit: 3
      successfulJobsHistoryLimit: 1
      concurrencyPolicy: Allow
    initJob:
      precompileAssets: true
      migrateDB: true
      migrateElasticsearch: true
      createAdmin: false
      backoffLimit: 10
    persistence:
      enabled: true
      existingClaim: mastodon-pvc
      mountPath: /opt/bitnami/mastodon/public/system
    volumePermissions:
      enabled: true
    externalDatabase:
      host: "cnpg-mastodon-rw.communication.svc.cluster.local"
      port: 5432
      user: ${MASTODON_DB_USER}
      database: ${MASTODON_DB_NAME}
      existingSecret: "mastodon-secret"
      existingSecretPasswordKey: "MASTODON_DB_PASSWORD"
    externalRedis:
      host: "dragonfly.database.svc.cluster.local"
      port: 6379
      password: ""
    elasticsearch:
      enabled: true
      sysctlImage:
        enabled: true
      security:
        enabled: false
        existingSecret: ""
        tls:
          restEncryption: false
      master:
        replicaCount: 1
      coordinating:
        replicaCount: 1
      data:
        replicaCount: 1
      ingest:
        replicaCount: 1
      service:
        ports:
          restAPI: 9200
    redis:
      enabled: false
    postgresql:
      enabled: false
    minio:
      enabled: false
    apache:
      enabled: false
